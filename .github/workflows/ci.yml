name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./ci.db
      NEXTAUTH_SECRET: ci-only-secret
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run build
